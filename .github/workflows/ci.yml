name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Run tests (twice — determinism)
        run: |
          pytest -q
          pytest -q
      - name: Coverage gate (>= 80%)
        # Enforces the floor the README's coverage badge advertises, so the badge
        # can never become a false claim — if coverage drops below 80%, CI fails.
        run: pytest --cov=convergence --cov=web --cov-fail-under=80 -q
      - name: Demo data matches the engine (no drift)
        # Rebuild the static demo data from the current engine and fail if the
        # committed web/site/data/ differs — keeps the published demo honest and
        # re-asserts that the build is reproducible across the Python matrix.
        run: |
          python -m web.build
          git diff --exit-code web/site/data/
