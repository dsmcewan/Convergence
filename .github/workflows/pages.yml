name: pages

# Publishes the static demo in web/site/ to GitHub Pages.
# The site fetches its data via relative paths (data/*.json), so it works
# under the project-pages subpath (https://dsmcewan.github.io/Convergence/).

on:
  workflow_run:
    workflows: ["tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Deploy only when the tests run that triggered us passed (or on a manual run).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/site
      - id: deployment
        uses: actions/deploy-pages@v4
