name: pages

# Publishes the static demo in web/site/ to GitHub Pages.
# The site fetches its data via relative paths (data/*.json), so it works
# under the project-pages subpath (https://dsmcewan.github.io/Convergence/).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/site
      - id: deployment
        uses: actions/deploy-pages@v4
